<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Portfolio - Personal Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <link rel="stylesheet" href="styles.css"> 
</head>

<body>
    <!-- Header Starts -->
    <section class="section">
        <!-- Fixed Navigation Starts -->
        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item" href="index.html">
                    <h2>Home</h2>
                </a>

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="navbarBasicExample" class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item" href="about.html">
                        <h2>About</h2>
                    </a>

                    <a class="navbar-item" href="portfolio.html">
                        <h2>Portfolio</h2>
                    </a>

                    <a class="navbar-item" href="contact.html">
                        <h2>Contact</h2>
                    </a>
                </div>
            </div>
        </nav>
    </section>
    <!-- Header Ends -->

    <!-- Page Title Starts -->
    <section class="hero is-primary">
        <div class="hero-body">
            <div class="container">
                <h1 class="title">my <span>portfolio</span></h1>
                <h2 class="subtitle">works</h2>
            </div>
        </div>
    </section>
    <!-- Page Title Ends -->

    <!-- Main Content Starts -->
    <section class="section">
        <div class="container">
            <!-- Portfolio Grid Starts -->
            <div class="columns is-multiline">
                <div class="column is-one-third">
                    <div class="card">
                        <div class="card-image">
                            <figure class="image is-4by3">
                                <img src="https://i.postimg.cc/tgwZK4w7/neww.jpg" alt="Portolio Image">
                            </figure>
                        </div>
                        <div class="card-content">
                            <div class="content">
                                <span>Scholarship Website</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Repeat similar columns for other projects -->

            </div>
            <!-- Portfolio Grid Ends -->

            <!-- Portfolio Details Starts -->
            <div class="modal" id="portfolioModal">
                <div class="modal-background"></div>
                <div class="modal-content">
                    <!-- Content goes here -->
                </div>
                <button class="modal-close is-large" aria-label="close"></button>
            </div>
            <!-- Portfolio Details Ends -->
        </div>
    </section>
    <!-- Main Content Ends -->

    <!-- Portfolio Navigation Starts -->
    <div class="columns is-centered">
        <div class="column is-half">
            <nav class="level">
                <div class="level-item has-text-centered">
                    <a class="button is-link" id="prevProject">
                        <span class="icon is-small">
                            <img src="img/projects/navigation/left-arrow.png" alt="previous">
                        </span>
                    </a>
                </div>
                <div class="level-item has-text-centered">
                    <a class="button is-link" id="nextProject">
                        <span class="icon is-small">
                            <img src="img/projects/navigation/right-arrow.png" alt="next">
                        </span>
                    </a>
                </div>
                <div class="level-item has-text-centered">
                    <a class="button is-danger" id="closeProject">
                        <span class="icon is-small">
                            <img src="img/projects/navigation/close-button.png" alt="close">
                        </span>
                    </a>
                </div>
            </nav>
        </div>
    </div>
    <!-- Portfolio Navigation Ends -->

</body>

</html>
