<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Portfolio - Personal Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Linking Tailwind CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>

<body class="bg-gray-100">
    <!-- Header Starts -->
    <header id="navbar-collapse-toggle" class="bg-white">
        <!-- Fixed Navigation Starts -->
        <ul class="hidden lg:flex justify-end space-x-4 px-8 py-4">
            <li>
                <a href="index.html">
                    <h2 class="text-lg">Home</h2>
                </a>
            </li>
            <li>
                <a href="about.html">
                    <h2 class="text-lg">About</h2>
                </a>
            </li>
            <li>
                <a href="portfolio.html">
                    <h2 class="text-lg">Portfolio</h2>
                </a>
            </li>
            <li>
                <a href="contact.html">
                    <h2 class="text-lg">Contact</h2>
                </a>
            </li>
        </ul>
    </header>
    <!-- Header Ends -->

    <!-- Page Title Starts -->
    <section class="mt-8">
        <h1 class="text-4xl font-bold">my <span class="text-blue-500">portfolio</span></h1>
        <span class="text-blue-500">works</span>
    </section>
    <!-- Page Title Ends -->

    <!-- Main Content Starts -->
    <section class="mt-8">
        <div id="grid-gallery" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <!-- Portfolio Grid Starts -->
            <section>
                <ul>
                    <li>
                        <figure>
                            <img src="https://i.postimg.cc/tgwZK4w7/neww.jpg" alt="Portfolio Image"
                                class="w-full h-auto object-cover">
                            <div class="text-white text-center bg-blue-500 p-2">
                                <span class="font-semibold">Scholarship Website</span>
                            </div>
                        </figure>
                    </li>
                    <li>
                        <figure>
                            <img src="img/projects/project-003.jpg" alt="Portfolio Image"
                                class="w-full h-auto object-cover">
                            <div class="text-white text-center bg-blue-500 p-2">
                                <span class="font-semibold">Resume Builder</span>
                            </div>
                        </figure>
                    </li>
                    <!-- Additional portfolio items -->
                </ul>
            </section>
            <!-- Portfolio Grid Ends -->

            <!-- Portfolio Details Starts -->
            <section>
                <ul>
                    <li>
                        <figure>
                            <figcaption class="p-4">
                                <h3 class="text-2xl font-semibold">Fitness Website</h3>
                                <div class="flex items-center mt-2">
                                    <i class="mr-2"></i>
                                    <span class="font-semibold">Project :</span>
                                    <span>Scholarship Website</span>
                                </div>
                                <!-- Additional details for the first project -->
                            </figcaption>
                            <img src="https://i.postimg.cc/tgwZK4w7/neww.jpg" alt="Portfolio Image"
                                class="w-full h-auto object-cover">
                        </figure>
                    </li>
                    <!-- Additional li items for other projects -->
                </ul>

                <!-- Portfolio Navigation Starts -->
                <nav class="flex justify-between mt-4">
                    <span><img src="img/projects/navigation/left-arrow.png" alt="previous"></span>
                    <span><img src="img/projects/navigation/right-arrow.png" alt="next"></span>
                    <span><img src="img/projects/navigation/close-button.png" alt="close"> </span>
                </nav>
                <!-- Portfolio Navigation Ends -->
            </section>
            <!-- Portfolio Details Ends -->
        </div>
    </section>
    <!-- Main Content Ends -->

</body>

</html>
