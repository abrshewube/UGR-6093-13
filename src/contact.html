<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact - Personal Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <link rel="stylesheet" href="styles.css">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Header Starts -->
    <section class="section">
        <!-- Fixed Navigation Starts -->
        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item" href="index.html">
                    <i class="fa fa-home"></i>
                    <h2>Home</h2>
                </a>

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="navbarBasicExample" class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item" href="about.html">
                        <i class="fa fa-user"></i>
                        <h2>About</h2>
                    </a>

                    <a class="navbar-item" href="portfolio.html">
                        <i class="fa fa-briefcase"></i>
                        <h2>Portfolio</h2>
                    </a>

                    <a class="navbar-item" href="contact.html">
                        <i class="fa fa-envelope-open"></i>
                        <h2>Contact</h2>
                    </a>
                </div>
            </div>
        </nav>
    </section>
    <!-- Header Ends -->

    <!-- Page Title Starts -->
    <section class="hero is-primary">
        <div class="hero-body">
            <div class="container">
                <h1 class="title">get in <span>touch</span></h1>
                <h2 class="subtitle">contact</h2>
            </div>
        </div>
    </section>
    <!-- Page Title Ends -->

    <!-- Main Content Starts -->
    <section class="section">
        <div class="container">
            <div class="columns">
                <!-- Left Side Starts -->
                <div class="column is-half">
                    <div>
                        <h3>Don't be shy!</h3>
                        <p>Feel free to get in touch with me. I am always open to discussing new projects, creative ideas, or opportunities to be part of your visions.</p>
                        <p>
                            <i class="fa fa-envelope"></i>
                            <span>mail me</span>abrshefru1427@gmail.com
                        </p>
                        <p>
                            <i class="fa fa-phone"></i>
                            <span>call me</span>+251965075728
                        </p>
                        <ul class="social-icons">
                            <li><a href="#"><i class="fa fa-facebook"></i></a></li>
                            <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                            <li><a href="#"><i class="fa fa-linkedin"></i></a></li>
                            <li><a href="#"><i class="fa fa-instagram"></i></a></li>
                        </ul>
                    </div>
                </div>
                <!-- Left Side Ends -->

                <!-- Contact Form Starts -->
                <div class="column is-half">
                    <form method="post">
                        <div class="field">
                            <label class="label">Your Name</label>
                            <div class="control">
                                <input class="input" type="text" name="name" placeholder="Your Name">
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Your Email</label>
                            <div class="control">
                                <input class="input" type="email" name="email" placeholder="Your Email">
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Your Subject</label>
                            <div class="control">
                                <input class="input" type="text" name="subject" placeholder="Your Subject">
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Your Message</label>
                            <div class="control">
                                <textarea class="textarea" name="message" placeholder="Your Message"></textarea>
                            </div>
                        </div>

                        <div class="field">
                            <div class="control">
                                <button class="button is-link" type="submit">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
                <!-- Contact Form Ends -->
            </div>
        </div>
    </section>
    <!-- Main Content Ends -->

</body>

</html>
